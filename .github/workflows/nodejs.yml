name: NodeCI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [ 24.x ]

    steps:
      - uses: actions/checkout@v6

      - name: Shutdown Ubuntu MySQL
        run: sudo service mysql stop

      - name: Setup MariaDB and Redis
        run: docker compose up -d --build --wait --wait-timeout 120

      - name: Verify MariaDB LZ4 provider
        run: |
          if ! docker compose exec -T mariadb mariadb -uroot -proot -Nse "SELECT COUNT(*) FROM information_schema.PLUGINS WHERE PLUGIN_NAME = 'provider_lz4' AND PLUGIN_STATUS = 'ACTIVE'" | grep -qx '1'; then
            echo "MariaDB LZ4 provider is missing or inactive"
            exit 1
          fi

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: npm install, build, and test
        run: |
          npm ci
          npm run build --if-present
          npm test
        env:
          CI: true
